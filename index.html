<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
   <header>
    <h1>Image Gallery</h1>
    <p>Welcome to My Image Gallery</p>
</header> 

<section class="gallery">

    <div class="image-box">
        <img src="images/image1.jpg" alt="Nature">
        <p class="image-title">Nature</p>
    </div>

    <div class="image-box">
        <img src="images/image2.jpg" alt="Mountain">
        <p class="image-title">Mountain</p>
    </div>

    <div class="image-box">
        <img src="images/image3.jpg" alt="Nature">
        <p class="image-title">Nature</p>
    </div>

    <div class="image-box">
        <img src="images/image4.jpg" alt="Nature">
         <p class="image-title">Nature</p>
    </div>

</section>
<footer>
    <p>© 2026 My Image Gallery | Created by Nandini</p>
</footer>
<div class="popup" id="popup">
    <span class="close">&times;</span>
    <button class="prev">&#10094 ;</button>
    <img id="popup-img" src="" alt="Full Image">
    <button class = "next"> &#10095 ;</button>
</div>
<script src="script.js"></script>
</body>
</html>
